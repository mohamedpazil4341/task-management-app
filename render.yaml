# Render Blueprint — Deployment Configuration
# This file tells Render how to build and deploy the app.
# Deploy: Push to GitHub → Connect in Render → Use this blueprint.

services:
  - type: web
    name: taskflow
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render generates a random secret
      - key: CLIENT_URL
        value: https://taskflow.onrender.com
